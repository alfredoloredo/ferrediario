<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FerreCheck V.11</title>
    <!-- Herramientas de Diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase (Versión de compatibilidad para evitar errores) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        #status-bar {
            position: fixed; top: 0; left: 0; right: 0;
            background: #f97316; /* NARANJA para que sea imposible no verlo */
            color: white; text-align: center; padding: 12px;
            font-family: sans-serif; font-weight: 900; z-index: 10000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        body { background-color: #f1f5f9; padding-top: 60px; font-family: sans-serif; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-cat { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; color: white; font-weight: 800; font-size: 10px; text-transform: uppercase; transition: transform 0.2s; }
        .btn-cat:active { transform: scale(0.9); }
        .selected-btn { border: 4px solid #1e293b !important; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="status-bar">🚀 ALFREDO: VERSIÓN 11.0 DETECTADA - CONECTANDO...</div>

    <div class="max-w-md mx-auto p-4">
        <header class="bg-slate-900 text-white p-5 rounded-3xl flex justify-between items-center mb-6 shadow-xl">
            <h1 class="text-xl font-black italic">FERRECHECK</h1>
            <div id="counter" class="bg-yellow-400 text-slate-900 px-3 py-1 rounded-full font-black text-xs">0</div>
        </header>

        <!-- Selección de Equipo -->
        <div class="card space-y-4">
            <div class="flex gap-2" id="sucursales">
                <button onclick="setSucursal('Tancol')" id="btn-Tancol" class="flex-1 py-3 rounded-xl font-black bg-blue-600 text-white shadow-md">TANCOL</button>
                <button onclick="setSucursal('Insurgentes')" id="btn-Insurgentes" class="flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-400">INSURGENTES</button>
            </div>
            <div class="grid grid-cols-5 gap-1" id="empleados">
                <!-- Botones se generan por JS -->
            </div>
        </div>

        <!-- Categorías -->
        <div class="grid grid-cols-5 gap-2 mb-6">
            <button onclick="selectCat('perdida', 'Venta Perdida', 'bg-red-500')" class="btn-cat bg-red-500" id="cat-perdida">Pérdida</button>
            <button onclick="selectCat('devol', 'Devolución', 'bg-orange-500')" class="btn-cat bg-orange-500" id="cat-devol">Devol</button>
            <button onclick="selectCat('nota', 'Comentario', 'bg-blue-500')" class="btn-cat bg-blue-500" id="cat-nota">Nota</button>
            <button onclick="selectCat('stock', 'Stock', 'bg-emerald-500')" class="btn-cat bg-emerald-500" id="cat-stock">Stock</button>
            <button onclick="selectCat('insumo', 'Insumo', 'bg-purple-500')" class="btn-cat bg-purple-500" id="cat-insumo">Insumo</button>
        </div>

        <!-- Formulario -->
        <div id="form-container" class="hidden animate__animated animate__fadeInUp">
            <div class="card border-t-8" id="form-card">
                <h3 id="form-title" class="font-black uppercase mb-4 text-slate-700">Detalle</h3>
                <input type="text" id="info-input" placeholder="¿Qué pasó?..." class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold mb-4 outline-none focus:border-blue-500">
                <button onclick="saveReport()" id="save-btn" class="w-full p-5 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95 transition-all">GUARDAR REPORTE</button>
            </div>
        </div>

        <!-- Historial Rápido -->
        <div class="mt-8">
            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Últimos Registros</h4>
            <div id="history-list" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE FIREBASE
        const config = {
            apiKey: "AIzaSyBcmriLjBc_S1W86R1bucP6Jy8iAU9sv6Q",
            authDomain: "ferrecheck-tampico.firebaseapp.com",
            projectId: "ferrecheck-tampico",
            storageBucket: "ferrecheck-tampico.firebasestorage.app",
            messagingSenderId: "779747685492",
            appId: "1:779747685492:web:bac35e4ca6c545bb8e4d21"
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "ferrecheck-tampico-v11";

        let selectedEmpleado = "";
        let selectedSucursal = "Tancol";
        let selectedCatId = "";
        let selectedColor = "";

        // Inicializar empleados
        const emps = ['Adrian', 'Ana', 'Emi', 'Fred', 'Sury'];
        const empDiv = document.getElementById('empleados');
        emps.forEach(e => {
            const btn = document.createElement('button');
            btn.innerText = e;
            btn.id = 'emp-' + e;
            btn.className = "py-4 rounded-xl text-[10px] font-black bg-slate-100 text-slate-400";
            btn.onclick = () => setEmpleado(e);
            empDiv.appendChild(btn);
        });

        function setEmpleado(name) {
            emps.forEach(e => document.getElementById('emp-' + e).className = "py-4 rounded-xl text-[10px] font-black bg-slate-100 text-slate-400");
            document.getElementById('emp-' + name).className = "py-4 rounded-xl text-[10px] font-black bg-slate-800 text-white shadow-lg";
            selectedEmpleado = name;
        }

        function setSucursal(suc) {
            ['Tancol', 'Insurgentes'].forEach(s => document.getElementById('btn-' + s).className = "flex-1 py-3 rounded-xl font-black bg-slate-100 text-slate-400");
            document.getElementById('btn-' + suc).className = "flex-1 py-3 rounded-xl font-black bg-blue-600 text-white shadow-lg";
            selectedSucursal = suc;
        }

        function selectCat(id, title, colorClass) {
            if(!selectedEmpleado) return alert("Selecciona tu nombre arriba");
            selectedCatId = id;
            selectedColor = colorClass;
            document.getElementById('form-container').classList.remove('hidden');
            document.getElementById('form-title').innerText = title;
            document.getElementById('form-card').style.borderColor = colorClass.replace('bg-', '#');
            document.getElementById('save-btn').className = `w-full p-5 rounded-2xl text-white font-black text-xl shadow-lg active:scale-95 transition-all ${colorClass}`;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function saveReport() {
            const info = document.getElementById('info-input').value;
            if(!info) return alert("Escribe qué sucedió");
            
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.innerText = "GUARDANDO...";

            const data = {
                empleado: selectedEmpleado,
                sucursal: selectedSucursal,
                cat: selectedCatId,
                info: info,
                createdAt: new Date().toISOString(),
                time: new Date().toLocaleTimeString()
            };

            try {
                await db.collection('artifacts').doc(appId).collection('feedbacks').add(data);
                alert("✅ REPORTE GUARDADO");
                document.getElementById('info-input').value = "";
                document.getElementById('form-container').classList.add('hidden');
            } catch (e) {
                console.error(e);
                alert("❌ ERROR AL GUARDAR. Pero el sistema está vivo.");
            } finally {
                btn.disabled = false;
                btn.innerText = "GUARDAR REPORTE";
            }
        }

        // Conexión Nube
        auth.signInAnonymously().then(() => {
            const bar = document.getElementById('status-bar');
            bar.style.background = "#10b981";
            bar.innerText = "🟢 SISTEMA ONLINE - LISTO";
            
            db.collection('artifacts').doc(appId).collection('feedbacks')
              .orderBy('createdAt', 'desc').limit(10).onSnapshot(snap => {
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                document.getElementById('counter').innerText = snap.size;
                snap.forEach(doc => {
                    const r = doc.data();
                    list.innerHTML += `<div class="bg-white p-3 rounded-xl border border-slate-100 text-[10px] font-bold uppercase">
                        <span class="text-blue-500">${r.time}</span> - ${r.info} (${r.empleado})
                    </div>`;
                });
            });
        });
    </script>
</body>
</html>
